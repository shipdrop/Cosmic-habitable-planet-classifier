<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Permanent+Marker&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Classifier</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Space Grotesk', sans-serif;
            color: #fff;

            /* cosmic background gradient */
            background:
                radial-gradient(circle, transparent 20%, #050508 85%),
                linear-gradient(135 deg, rgba(230, 0, 38, 0.15) 0%, rgba(13, 10, 25, 0) 50%, rgba(0, 240, 255, 0.08) 100%),
                radial-gradient(rgba(255, 255, 255, 0.15) 1px, transparent 0);

            background-size:
                100% 100%,
                100% 100%,
                16px 16px;
            background-attachment: fixed;


        }

        /* comic book panel effect */
        .panel {
            background-color: #141419;
            border: 4px solid #ffffff;
            box-shadow: 8px 8px 0px #e60026; /* comic book shadow effect */
            border-radius: 0px;
            transform: rotate(-0.5deg); /* tilt */
            transition: transform 0.2s ease;
        }
        
        .panel:hover {
            transform: rotate(0.5deg) scale(1.01);
        }

        /* spider-verse type Titles */
        h1, h2 {
            font-family: 'bangers', cursive;
            letter-spacing: 2px;
            color: #ffe600;
            text-shadow: 3px 3px 0px #e60026, -1px 1px 0px #000;
        }

        /* slider and input styles */
        input[type="range"] {
            -webkit-appearance: none;
            background: #252530;
            border: 2px solid #ffffff;
            height: 12px;
        }
        
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-apperance: none;
            width: 24px;
            height: 24px;
            background: #e60026;
            border: 2px solid #ffffff;
            cursor: pointer;
            box-shadow: 2px 2px 0px #000;
        }

        /* Action Button */
        button {
            font-family: "Permanent Marker", cursive;
            font-size: 1.5em;
            background: #e60026;
            color: white;
            border: 3px solid #ffffff;
            padding: 10px 20px;
            box-shadow: 5px 5px 0px #00f0ff;
            cursor: pointer;
        }

        button.active {
            transform: transtlate(3px, 3px);
            box-shadow: 2px 2px 0px #00f0ff;
        }

        /* prediction result box */
        .prediction-badge {
            font-family: 'bangers', cursive;
            font-size: 2.5rem;
            color: #00f0ff;
            text-align: center;
            background: #000000;
            border: 3px dashed #e60026;
            padding: 15px;
            margin-top: 20px;
        }

    </style>
</head>
<body>

<div class="container" style="max-width: 1000px; margin: 40px auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
    
    <div style="text-align: center; margin-bottom: 10px; grid-column: span 2;">
        <h1 style="font-size: 4rem; margin: 0;">EXOPLANET CLASSIFIER</h1>
        <p style="color: #00f0ff; font-weight: bold; text-transform: uppercase;">Miles Morales Edition // Visualization Active</p>
    </div>

    <div class="panel" style="padding: 30px;">
        <h2 style="font-size: 2rem; margin-top: 0;">Make Your Planet</h2>
        
        <div style="margin-bottom: 20px;">
            <label style="display:block; font-weight:bold; margin-bottom:5px; text-transform:uppercase;">Planet Mass (Earths): <span id="mass-val" style="color:#ffe600">5.0</span></label>
            <input type="range" id="mass" min="0.1" max="50" step="0.1" value="5.0" style="width: 100%;" oninput="updateVisualization()">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display:block; font-weight:bold; margin-bottom:5px; text-transform:uppercase;">Planet Radius (Earth Radii): <span id="radius-val" style="color:#ffe600">1.5</span></label>
            <input type="range" id="radius" min="0.1" max="15" step="0.1" value="1.5" style="width: 100%;" oninput="updateVisualization()">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display:block; font-weight:bold; margin-bottom:5px; text-transform:uppercase;">Orbital Period (Days): <span id="period-val" style="color:#ffe600">30</span></label>
            <input type="range" id="period" min="0.5" max="500" step="0.5" value="30" style="width: 100%;" oninput="updateVisualization()">
        </div>
        
        <div style="margin-bottom: 20px;">
            <label style="display:block; font-weight:bold; margin-bottom:5px; text-transform:uppercase;">Stellar Temp (Kelvin): <span id="temp-val" style="color:#ffe600">5800</span></label>
            <input type="range" id="star_temp" min="2000" max="10000" step="50" value="5800" style="width: 100%;" oninput="updateVisualization()">
        </div>

        <div style="text-align: center; margin-top: 30px;">
            <button id="predict-btn" onclick="sendPrediction()" style="width: 100%;">RUN ANALYSIS</button>
        </div>
    </div>

    <div style="display: flex; flex-direction: column; gap: 30px;">
        
       <div class="panel" style="padding: 20px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; align-items: center; background: #000; border-color: #00f0ff; box-shadow: 8px 8px 0px #00f0ff; min-height: 550px; justify-content: flex-start;">
    
    <h2 style="font-size: 1.8rem; margin-top: 0; margin-bottom: 20px; color: #fff; letter-spacing: 2px;">SCANNING TARGET...</h2>
    
    <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; width: 100%;">
        
        <div id="planet-visual-container" style="display: flex; justify-content: center; align-items: flex-end; gap: 40px; min-height: 220px; width: 100%; padding-bottom: 10px;">
            <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
                <div id="earth-sprite" style="width: 50px; height: 50px; background: radial-gradient(circle, #2563eb, #1d4ed8); border-radius: 50%; border: 3px solid #fff; box-shadow: 0 0 15px rgba(29, 78, 216, 0.5), inset 0 0 10px rgba(0,0,0,0.6); aspect-ratio: 1/1; box-sizing: border-box;"></div>
                <span style="font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem; color: #a1a1aa; text-transform: uppercase; font-weight: bold;">Earth (1.0x)</span>
            </div>

            <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
                <div id="planet-sprite" style="width: 75px; height: 75px; background-color: #00f0ff; border-radius: 50%; border: 4px solid #fff; box-shadow: 0 0 30px #00f0ff, inset 0 0 20px rgba(0,0,0,0.6); z-index: 2; transition: background-color 0.6s ease-in-out, box-shadow 0.6s ease-in-out, width 0.15s ease-out, height 0.15s ease-out; aspect-ratio: 1/1; box-sizing: border-box;"></div>
                <span style="font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem; color: #ffe600; text-transform: uppercase; font-weight: bold;">Custom (<span id="radius-scale-label">1.5</span>x)</span>
            </div>
        </div>
        
        <p style="font-family: 'Permanent Marker', cursive; color: #ffe600; font-size: 1.3rem; margin: 0; letter-spacing: 1px; text-transform: uppercase;">
            Target Visual Signature
        </p>

        <div style="width: 90%; background: #111; border: 2px solid #333; border-radius: 8px; padding: 12px; margin: 10px 0; font-family: 'Space Grotesk', sans-serif; text-align: left; box-sizing: border-box;">
            <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; border-bottom: 1px solid #333; padding-bottom: 5px; margin-bottom: 8px; font-weight: bold; font-size: 0.75rem; color: #888; text-transform: uppercase;">
                <span>Metric</span>
                <span style="text-align: center;">Earth</span>
                <span style="text-align: center; color: #ffe600;">Custom</span>
            </div>
            <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; font-size: 0.85rem; padding: 3px 0; color: #eee;">
                <span>🪐 Mass (vs Earth)</span>
                <span style="text-align: center; color: #a1a1aa;">1.0</span>
                <span style="text-align: center; font-weight: bold; color: #ffe600;"><span id="stat-mass">1.0</span>x</span>
            </div>
            <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; font-size: 0.85rem; padding: 3px 0; color: #eee;">
                <span>📐 Radius (vs Earth)</span>
                <span style="text-align: center; color: #a1a1aa;">1.0</span>
                <span style="text-align: center; font-weight: bold; color: #ffe600;"><span id="stat-radius">1.0</span>x</span>
            </div>
            <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; font-size: 0.85rem; padding: 3px 0; color: #eee;">
                <span>⏱️ Year Length (Days)</span>
                <span style="text-align: center; color: #a1a1aa;">365</span>
                <span style="text-align: center; font-weight: bold; color: #ffe600;"><span id="stat-period">30</span></span>
            </div>
            <div style="display: grid; grid-template-columns: 2fr 1fr 1fr; font-size: 0.85rem; padding: 3px 0; color: #eee;">
                <span>☀️ Star Temperature</span>
                <span style="text-align: center; color: #a1a1aa;">5778 K</span>
                <span style="text-align: center; font-weight: bold; color: #ffe600;"><span id="stat-temp">5800</span> K</span>
            </div>
        </div>
        
        <div id="result" class="panel" style="padding: 20px; background: #141419; border-color: #e60026; box-shadow: 5px 5px 0px #e60026; width: 90%; display: none; box-sizing: border-box;"></div>

    </div>
</div>

<script>
    async function sendPrediction() {
        const payload = {
            pl_bmasse: parseFloat(document.getElementById('mass').value),
            pl_rade: parseFloat(document.getElementById('radius').value),
            pl_orbper: parseFloat(document.getElementById('period').value),
            st_teff: parseFloat(document.getElementById('star_temp').value)
        };

        // Replace this URL with your live API URL once deployed to Render or HuggingFace
        const apiUrl = "https://rikimii-exoplanet-api.hf.space/predict"; 
        const resultDiv = document.getElementById('result');

        try {
            const response = await fetch(apiUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            if (!response.ok) {
                throw new Error(`Server returned status: ${response.status}`);
            }

            const data = await response.json();
            
            resultDiv.style.display = "block";
            resultDiv.innerHTML = `<strong>Result:</strong> ${data.prediction}`;
            
           if (data.prediction === "Habitable Candidate") {
            resultDiv.style.background = "#047857"; // Spider-Bot Green
        } else if (data.prediction === "Gas Giant") {
            resultDiv.style.background = "#b45309"; // Giant Orange
        } else {
            resultDiv.style.background = "#1d4ed8"; // Deep Space Blue
        }
        

    } catch (error) {
        console.error("Error communicating with the API:", error);
        resultDiv.style.display = "block";
        resultDiv.innerHTML = `<strong>⚠️ EXOPLANET FEED OFFLINE</strong><br><span style="font-size:0.9rem;">The mainframe is waking up or training in the cloud. Please try again in a minute!</span>`;
        resultDiv.style.background = "#e60026"; // red background for error
    }}        

    // visualization update for the customized planet //
    function updateVisualization() {
        // get input values //
        const mass = parseFloat(document.getElementById('mass').value);
        const radius = parseFloat(document.getElementById('radius').value);
        const period = parseFloat(document.getElementById('period').value);
        const temp = parseFloat(document.getElementById('star_temp').value);

        // Update the text values next to sliders //
        document.getElementById('mass-val').innerText = mass.toFixed(1);
        document.getElementById('radius-val').innerText = radius.toFixed(1);
        document.getElementById('period-val').innerText = period.toFixed(0);
        document.getElementById('temp-val').innerText = temp.toFixed(0);

        // Update the stats in the visual signature box
        document.getElementById('radius-scale-label').innerText = radius.toFixed(1);
        document.getElementById('stat-mass').innerText = mass.toFixed(1);
        document.getElementById('stat-radius').innerText = radius.toFixed(1);
        document.getElementById('stat-period').innerText = period.toFixed(0);
        document.getElementById('stat-temp').innerText = temp.toFixed(0);

        const baseEarthSize = 50; // base size for Earth sprite
        let sizePx = baseEarthSize * radius;

        if (sizePx > 200) sizePx = 200;
        if (sizePx < 15) sizePx = 15;


        // Update the planet sprite 
        const planetSprite = document.getElementById('planet-sprite');

        // Size logic: map radius
        let sizepx = (radius / 15) * 180 + 20; // min size 20px, max 200px
        planetSprite.style.width = sizepx + "px";
        planetSprite.style.height = sizepx + "px";

        // Color logic: map temperature to color (blue for hot, red for cool)
        let planetColor, glowColor;
        if (temp < 4000) {
            planetColor = "#e60023";
            glowColor = "#e60023"; // Cool star
        } else if (temp < 6500) {
            planetColor = "#00f0ff";
            glowColor = "#00f0ff";  // Sun-like Star
        } else {
            planetColor = "#ffe600";
            glowColor = "#ffe600"; // Hot Star
        }

        // apply the styles
        planetSprite.style.backgroundColor = planetColor;
        planetSprite.style.boxShadow = `0 0 30px ${glowColor}, inset 0 0 20px rgba(0, 0, 0, 0.6)`;
    }

    window.onload = function () {
        updateVisualization();
    };

</script>
</body>
</html>
