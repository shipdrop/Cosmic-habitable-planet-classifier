name: Sync to Hugging Face Spaces

on:
  push:
    branches: ["main"]

    #allow manual trigger sync from github
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}

        run: git push --force https://Rikimii:$HF_TOKEN@huggingface.co/spaces/Rikimii/Exoplanet-api main